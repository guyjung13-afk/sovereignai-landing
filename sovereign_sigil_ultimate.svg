<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. THE MONOLITH BOUNDARY (Cold Steel) -->
    <path d="M 50 8 L 88 28 V 72 L 50 92 L 12 72 V 28 Z" stroke="#8E9AAF" stroke-width="3" opacity="0.4"/>
    
    <!-- 2. THE LATTICE INFRASTRUCTURE (Steel & Gold) -->
    <g opacity="0.6">
      <path d="M 12 28 L 88 72 M 88 28 L 12 72" stroke="#8E9AAF" stroke-width="1" opacity="0.2"/>
      <path d="M 50 8 V 92 M 12 50 H 88" stroke="#8E9AAF" stroke-width="1" opacity="0.2"/>
      
      <g transform="translate(50 50)">
        <rect x="-35" y="-35" width="70" height="70" transform="rotate(15)" stroke="#8E9AAF" stroke-width="0.8" opacity="0.3"/>
        <rect x="-30" y="-30" width="60" height="60" transform="rotate(35)" stroke="#8E9AAF" stroke-width="0.8" opacity="0.4"/>
        <rect x="-25" y="-25" width="50" height="50" transform="rotate(55)" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
        <rect x="-20" y="-20" width="40" height="40" transform="rotate(75)" stroke="#D4AF37" stroke-width="2.5"/>
      </g>
    </g>

    <!-- 3. THE NEURAL CORE (High-Density Gold) -->
    <g transform="translate(50 50)">
      <circle cx="0" cy="0" r="5" fill="#D4AF37" stroke="none"/>
      <g fill="#D4AF37">
        <circle cx="0" cy="-12" r="2.5"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(40)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(80)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(120)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(160)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(200)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(240)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(280)"/>
        <circle cx="0" cy="-12" r="2.5" transform="rotate(320)"/>
      </g>
      <path d="M 0 -12 L 0 0" stroke="#D4AF37" stroke-width="0.8" opacity="0.5"/>
      <path d="M 0 -12 L 0 0" stroke="#D4AF37" stroke-width="0.8" opacity="0.5" transform="rotate(80)"/>
      <path d="M 0 -12 L 0 0" stroke="#D4AF37" stroke-width="0.8" opacity="0.5" transform="rotate(160)"/>
      <path d="M 0 -12 L 0 0" stroke="#D4AF37" stroke-width="0.8" opacity="0.5" transform="rotate(240)"/>
      <path d="M 0 -12 L 0 0" stroke="#D4AF37" stroke-width="0.8" opacity="0.5" transform="rotate(320)"/>
    </g>
  </g>
</svg>